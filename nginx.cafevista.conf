# ============================================================
# Nginx Configuration for Vista Web - cafevista.ir
# ============================================================
# Security-hardened config with rate limiting, CSP, and HSTS.

# ─── Rate Limiting Zones ─────────────────────────────────────
# Define shared memory zones OUTSIDE server blocks

# General API: 20 req/s per IP
limit_req_zone $binary_remote_addr zone=api_general:20m rate=20r/s;

# Auth endpoints: 3 req/min per IP (strict)
limit_req_zone $binary_remote_addr zone=auth_strict:10m  rate=3r/m;

# Upload endpoints: 5 req/min per IP
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

# Connection limit: max 50 simultaneous connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─── HTTP → HTTPS redirect ───────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name www.cafevista.ir cafevista.ir;
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://cafevista.ir$request_uri;
    }
}

# ─── www → non-www redirect ──────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cafevista.ir;

    ssl_certificate     /etc/letsencrypt/live/cafevista.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cafevista.ir/privkey.pem;

    return 301 https://cafevista.ir$request_uri;
}

# ─── Main site ───────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cafevista.ir;

    ssl_certificate     /etc/letsencrypt/live/cafevista.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cafevista.ir/privkey.pem;
    
    # Modern TLS only
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:50m;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers (applied to every response) ──────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups"                   always;
    add_header Cross-Origin-Resource-Policy "same-site"                                always;

    # ── Hide server info ──────────────────────────────────────
    server_tokens off;

    # ── Max upload size ───────────────────────────────────────
    client_max_body_size 50m;

    # ── Gzip ─────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ── Slow loris protection ─────────────────────────────────
    client_body_timeout   12s;
    client_header_timeout 12s;
    keepalive_timeout     15s;
    send_timeout          10s;

    # ── Connection limit ──────────────────────────────────────
    limit_conn conn_limit 50;

    # ─── Auth endpoints (very strict rate limit) ─────────────
    location ~* ^/api/auth/(send-otp|verify-otp|login|register|refresh) {
        limit_req zone=auth_strict burst=2 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Upload endpoints ─────────────────────────────────────
    location /api/upload {
        limit_req zone=upload_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── General API ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Next.js static (cache aggressively) ─────────────────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ─── Well-known ───────────────────────────────────────────
    location /.well-known/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Content-Type "application/json";
        expires 1d;
    }

    # ─── Main proxy ───────────────────────────────────────────
    location / {
        limit_req zone=api_general burst=50 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        
        proxy_no_cache     $http_pragma $http_authorization;
    }
    
    # ─── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/cafevista_access.log;
    error_log  /var/log/nginx/cafevista_error.log;
}
