services:
  vista-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-slim}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.coffevista.ir}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://cafevista.ir}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-2.6.0}
    image: vista-web:latest
    container_name: vista-web
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.coffevista.ir}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://cafevista.ir}
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-2.6.0}
    ports:
      - "${VISTA_WEB_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health", "||", "exit", "0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
