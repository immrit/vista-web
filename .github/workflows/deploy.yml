name: Vista Web CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.coffevista.ir
          NEXT_PUBLIC_APP_URL: https://coffevista.ir
          JWT_SECRET: ci-jwt-secret-change-me-123456789012
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
          CSRF_SECRET: ci-csrf-secret-change-me-1234567890

      - name: Docker build
        run: docker build --build-arg NEXT_PUBLIC_API_URL=https://api.coffevista.ir --build-arg NEXT_PUBLIC_APP_URL=https://coffevista.ir --build-arg NEXT_PUBLIC_APP_VERSION=2.5.0 -t vista-web:ci .
